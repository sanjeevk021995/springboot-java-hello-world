apiVersion: v1
kind: Pod
spec:
  serviceAccountName: jenkins-agent-sa

  containers:

  - name: maven
    image: maven:3.9.9-eclipse-temurin-17
    command: ['cat']
    tty: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "356Mi"
        cpu: "200m"
    volumeMounts:
      - name: maven-cache
        mountPath: /root/.m2
  - name: kubectl
    image: bitnami/kubectl
    command:
      - cat
    tty: true
    securityContext:
      runAsUser: 1000
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"

  - name: helm
    image: alpine/helm:3.14.0
    command: ['sh','-c','sleep 3600']
    tty: true
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "128Mi"
        cpu: "200m"

  - name: kaniko
    image: gcr.io/kaniko-project/executor:v1.23.2-debug
    command: 
    - /busybox/cat
    tty: true
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "256Mi"
        cpu: "300m"
    volumeMounts:
    - name: docker-config
      mountPath: /kaniko/.docker

  volumes:
  - name: docker-config
    secret:
      secretName: dockerhub-secret
  - name: maven-cache
    persistentVolumeClaim:
      claimName: maven-cache-pvc