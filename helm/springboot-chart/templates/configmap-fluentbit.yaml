apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "springboot-logging.fullname" . }}-fluentbit
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        1
        Log_Level    info

    [INPUT]
        Name tail
        Path {{ .Values.fluentbitConfig.logPath }}
        Tag springboot
        Refresh_Interval 5

    [OUTPUT]
        Name stdout
        Match *