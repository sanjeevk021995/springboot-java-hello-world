apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "springboot-logging.fullname" . }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: {{ include "springboot-logging.name" . }}

  template:
    metadata:
      labels:
        app: {{ include "springboot-logging.name" . }}

    spec:

      volumes:
        - name: log-volume
          emptyDir: {}

        - name: fluentbit-config
          configMap:
            name: {{ include "springboot-logging.fullname" . }}-fluentbit

      containers:

      - name: springboot-app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
          - containerPort: 8080

        volumeMounts:
          - name: log-volume
            mountPath: {{ .Values.logVolume.mountPath }}

        resources:
          {{- toYaml .Values.resources | nindent 10 }}

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20


      - name: fluent-bit
        image: "{{ .Values.fluentbit.image }}:{{ .Values.fluentbit.tag }}"

        volumeMounts:
          - name: log-volume
            mountPath: /logs

          - name: fluentbit-config
            mountPath: /fluent-bit/etc

        command:
          - /fluent-bit/bin/fluent-bit
          - -c
          - /fluent-bit/etc/fluent-bit.conf

        resources:
          {{- toYaml .Values.fluentbit.resources | nindent 10 }}