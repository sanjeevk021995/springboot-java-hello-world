replicaCount: 2

image:
  repository: yourdockerhub/springboot-demo
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

probes:
  readiness:
    path: /actuator/health
    initialDelaySeconds: 20
    periodSeconds: 10

  liveness:
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 20